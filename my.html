<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 · Prague / Czech Souvenir Collection Partner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
<header>
  <div class="wrap nav">
    <a class="brand" href="/"><div class="badge">P</div><div><strong>Prague / Czech</strong><small>Souvenir Collection Partner</small></div></a>
    <nav>
      <a href="/">Home</a>
      <a href="/#collection">Collection</a>
      <a href="/#contact">Contact</a>
    </nav>
  </div>
</header>
<main class="login-main wrap">
  <section class="login-card panel">
    <p class="eyebrow">管理入口</p>
    <h1>管理员登录</h1>
    <form class="login-form" data-admin-login-form>
      <label>
        <span>账号</span>
        <input type="text" name="username" autocomplete="username" required>
      </label>
      <label>
        <span>密码</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="btn btn-primary" type="submit">登录</button>
      <p class="form-status" data-login-status></p>
    </form>
  </section>
</main>
<script src="admin/admin-auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
